<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema POS & Delivery Estilo Influye</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-slate-900 text-white p-4 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-bold tracking-wide">🚀 INFLUYE POS</h1>
        <div class="space-x-4">
            <button onclick="switchTab('pos')" class="px-3 py-2 rounded bg-blue-600 hover:bg-blue-700">Punto de Venta</button>
            <button onclick="switchTab('delivery')" class="px-3 py-2 rounded bg-emerald-600 hover:bg-emerald-700">Repartidores & Delivery</button>
            <button onclick="switchTab('caja')" class="px-3 py-2 rounded bg-amber-600 hover:bg-amber-700">Caja e Informes</button>
        </div>
    </nav>

    <div class="container mx-auto p-4 mt-6">
        
        <div id="tab-pos" class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow">
                <h2 class="text-xl font-bold mb-4 border-b pb-2">Menú Comercial</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="lista-productos">
                    </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow flex flex-col justify-between">
                <div>
                    <h2 class="text-xl font-bold mb-4 border-b pb-2">Pedido Actual</h2>
                    <div id="carrito" class="space-y-3 mb-4 max-h-64 overflow-y-auto">
                        <p class="text-gray-400 text-center py-4">No hay productos seleccionados.</p>
                    </div>
                </div>
                <div class="border-t pt-4 space-y-3">
                    <div class="flex justify-between font-bold text-lg">
                        <span>Total:</span><span id="total-pedido">$0</span>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700">Tipo de Servicio:</label>
                        <select id="tipo-pedido" class="w-full mt-1 p-2 border rounded">
                            <option value="Comedor">Local / Comedor</option>
                            <option value="Retiro">Para Retiro</option>
                            <option value="Delivery">Delivery</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700">Medio de Pago:</label>
                        <select id="metodo-pago" class="w-full mt-1 p-2 border rounded">
                            <option value="Efectivo">💵 Efectivo</option>
                            <option value="Tarjeta">💳 Tarjeta Débito/Crédito</option>
                        </select>
                    </div>
                    <button onclick="enviarPedido()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">Consolidar y Pagar</button>
                </div>
            </div>
        </div>

        <div id="tab-delivery" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-xl shadow">
                <h2 class="text-xl font-bold mb-4 border-b pb-2">Consola de Despacho en Tiempo Real</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="border p-4 rounded-lg bg-gray-50">
                        <h3 class="font-bold text-red-600 mb-2">📥 Pendientes en Cocina (Delivery)</h3>
                        <div id="pedidos-delivery-pendientes" class="space-y-3"></div>
                    </div>
                    <div class="border p-4 rounded-lg bg-gray-50">
                        <h3 class="font-bold text-emerald-600 mb-2">🏍️ Control de Repartidores Propios</h3>
                        <div class="p-3 border rounded bg-white flex justify-between items-center shadow-sm">
                            <div>
                                <p class="font-bold text-gray-800">Carlos Moto (ID: 1)</p>
                                <p class="text-sm text-amber-600 font-medium" id="rep-dinero">Efectivo en Calle: $0</p>
                            </div>
                            <button onclick="rendirRepartidor(1)" class="bg-emerald-500 text-white px-3 py-1 rounded text-sm hover:bg-emerald-600">Rendir Cuentas</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-caja" class="hidden max-w-2xl mx-auto space-y-6">
            <div class="bg-white p-6 rounded-xl shadow grid grid-cols-2 gap-4">
                <button onclick="abrirCaja()" class="bg-blue-600 text-white p-4 font-bold rounded-lg shadow hover:bg-blue-700">Apertura de Caja ($)</button>
                <button onclick="obtenerInformeX()" class="bg-amber-500 text-white p-4 font-bold rounded-lg shadow hover:bg-amber-600">Imprimir Informe X</button>
                <button onclick="cerrarCajaZ()" class="bg-red-600 text-white p-4 font-bold rounded-lg shadow hover:bg-red-700 col-span-2">Ejecutar Cierre Fiscal (Informe Z)</button>
            </div>
            <div class="bg-zinc-800 text-green-400 p-6 rounded-xl shadow-2xl font-mono text-sm hidden" id="ticket-output">
                <h3 class="text-center font-bold border-b border-dashed border-green-400 pb-2 mb-2">TICKET DE AUDITORÍA</h3>
                <pre id="ticket-content"></pre>
            </div>
        </div>

    </div>

    <script>
        const API_URL = window.location.origin;
        let carrito = [];
        let productosCache = [];

        function switchTab(tab) {
            document.getElementById('tab-pos').classList.add('hidden');
            document.getElementById('tab-delivery').classList.add('hidden');
            document.getElementById('tab-caja').classList.add('hidden');
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            if(tab === 'delivery') cargarDelivery();
        }

        async function cargarProductos() {
            const res = await fetch(`${API_URL}/api/inventario`);
            productosCache = await res.json();
            const container = document.getElementById('lista-productos');
            container.innerHTML = '';
            productosCache.forEach(p => {
                container.innerHTML += `
                    <div class="p-4 border rounded-xl flex justify-between items-center hover:shadow transition bg-slate-50">
                        <div>
                            <h4 class="font-bold text-gray-800">${p.nombre}</h4>
                            <p class="text-blue-600 font-semibold">$${p.precio}</p>
                            <p class="text-xs text-gray-500">Stock: ${p.stock} un.</p>
                        </div>
                        <button onclick="agregarAlCarrito(${p.id})" class="bg-blue-600 text-white px-3 py-1 rounded-lg font-bold hover:bg-blue-700">+</button>
                    </div>
                `;
            });
        }

        function agregarAlCarrito(id) {
            const prod = productosCache.find(p => p.id === id);
            const item = carrito.find(i => i.id === id);
            if (item) item.cantidad++;
            else carrito.push({ ...prod, cantidad: 1 });
            renderCarrito();
        }

        function renderCarrito() {
            const container = document.getElementById('carrito');
            if(carrito.length === 0) {
                container.innerHTML = '<p class="text-gray-400 text-center py-4">No hay productos seleccionados.</p>';
                document.getElementById('total-pedido').innerText = '$0';
                return;
            }
            container.innerHTML = '';
            let total = 0;
            carrito.forEach(item => {
                total += item.precio * item.cantidad;
                container.innerHTML += `
                    <div class="flex justify-between text-sm items-center border-b pb-2">
                        <span>${item.nombre} x${item.cantidad}</span>
                        <span class="font-semibold">$${item.precio * item.cantidad}</span>
                    </div>
                `;
            });
            document.getElementById('total-pedido').innerText = `$${total}`;
        }

        async function enviarPedido() {
            if(carrito.length === 0) return alert("Agrega productos");
            const payload = {
                tipo: document.getElementById('tipo-pedido').value,
                metodoPago: document.getElementById('metodo-pago').value,
                productosPedidos: carrito.map(i => ({ id: i.id, cantidad: i.cantidad }))
            };
            const res = await fetch(`${API_URL}/api/pedidos`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if(data.error) alert(data.error);
            else {
                alert("Pedido consolidado con éxito en caja.");
                carrito = [];
                renderCarrito();
                cargarProductos();
            }
        }

        async function cargarDelivery() {
            const res = await fetch(`${API_URL}/api/delivery/pendientes`);
            const pedidos = await res.json();
            const container = document.getElementById('pedidos-delivery-pendientes');
            container.innerHTML = pedidos.length === 0 ? '<p class="text-xs text-gray-500">No hay despachos en cola.</p>' : '';
            pedidos.forEach(p => {
                container.innerHTML += `
                    <div class="p-3 border rounded bg-white shadow-sm flex justify-between items-center">
                        <div>
                            <p class="font-bold text-xs">Pedido #${p.id} - Total: $${p.total}</p>
                            <p class="text-xs text-gray-500">Pago: ${p.metodoPago}</p>
                        </div>
                        <div class="space-x-2">
                            <button onclick="asignarRepartidor(${p.id}, 1)" class="bg-blue-500 text-white text-xs px-2 py-1 rounded">Asignar a Carlos</button>
                            <button onclick="entregarPedido(${p.id})" class="bg-emerald-500 text-white text-xs px-2 py-1 rounded">Entregar</button>
                        </div>
                    </div>
                `;
            });
        }

        async function asignarRepartidor(pedidoId, repartidorId) {
            await fetch(`${API_URL}/api/delivery/asignar`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ pedidoId, repartidorId })
            });
            cargarDelivery();
            document.getElementById('rep-dinero').innerText = "Estado: En Ruta de despacho";
        }

        async function entregarPedido(pedidoId) {
            await fetch(`${API_URL}/api/delivery/entregar`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ pedidoId })
            });
            cargarDelivery();
            alert("Pedido finalizado.");
            document.getElementById('rep-dinero').innerText = "Efectivo en Calle (Por rendir): Requiere cierre";
        }

        async function rendirRepartidor(repartidorId) {
            const res = await fetch(`${API_URL}/api/delivery/rendir`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ repartidorId })
            });
            const data = await res.json();
            alert(data.mensaje);
            document.getElementById('rep-dinero').innerText = "Efectivo en Calle: $0 (Rendido)";
        }

        async function abrirCaja() {
            const monto = prompt("Monto inicial de apertura de caja:", "20000");
            if (!monto) return;
            const res = await fetch(`${API_URL}/api/caja/apertura`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ monto })
            });
            const data = await res.json();
            alert(data.error || data.mensaje);
        }

        async function obtenerInformeX() {
            const res = await fetch(`${API_URL}/api/caja/informe-x`);
            const data = await res.json();
            if(data.error) return alert(data.error);

            document.getElementById('ticket-output').classList.remove('hidden');
            document.getElementById('ticket-content').innerText = `
=================================
     AUDITORÍA INFORME X 
=================================
ID Turno: ${data.turnoId}
Apertura Base: $${data.montoApertura}
Ventas Efectivo: $${data.ventasEfectivo}
Ventas Tarjeta: $${data.ventasTarjeta}
Ingresos (Rend): $${data.ingresos}
Egresos/Gastos: $${data.egresos}
---------------------------------
EFECTIVO ESPERADO: $${data.efectivoEsperado}
=================================
Monto Anulaciones: $${data.totalAnulado}
            `;
        }

        async function cerrarCajaZ() {
            if(!confirm("¿Está seguro de emitir el Informe Z? Esto bloqueará el turno fiscal actual.")) return;
            const res = await fetch(`${API_URL}/api/caja/cierre-z`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ efectivoReal: 0 })
            });
            const data = await res.json();
            if(data.error) alert(data.error);
            else {
                alert(data.mensaje);
                document.getElementById('ticket-output').classList.add('hidden');
            }
        }

        cargarProductos();
    </script>
</body>
</html>
